services:
  functions:
    build:
      context: .
      dockerfile: src/DailySummary.Functions/Dockerfile
    environment:
      # Schedules (NCRONTAB). Override to test.
      MORNING_SCHEDULE: "0 0 6 * * *"
      EVENING_SCHEDULE: "0 0 22 * * *"
      # Secrets — supply via your shell / .env, never commit them.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GMAIL_APP_PASSWORD: "${GMAIL_APP_PASSWORD:-}"
      GCAL_ICAL_URL: "${GCAL_ICAL_URL:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      AzureWebJobsStorage: "UseDevelopmentStorage=true"
    volumes:
      - ./out:/home/site/wwwroot/out
    depends_on:
      - ollama

  # Local LLM. Pull a model once running:  docker compose exec ollama ollama pull llama3.1
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
