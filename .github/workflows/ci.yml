name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DailySummary.sln

      - name: Build
        run: dotnet build DailySummary.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DailySummary.sln --configuration Release --no-build --verbosity normal
